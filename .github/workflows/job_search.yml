name: Daily Job Search

on:
  schedule:
    # 7 AM UTC = 8 AM UK time (BST, Mar-Oct) / 7 AM UK time (GMT, Nov-Mar)
    - cron: "0 7 * * *"
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r job_search/requirements.txt

      - name: Run job search
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: python job_search/search.py

      - name: Commit updated seen jobs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add job_search/seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push origin HEAD:main
